services:
  db:
    image: postgres:16-alpine
    container_name: gamer-health-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gamer_health
    ports:
      - "55432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gamer_health"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
